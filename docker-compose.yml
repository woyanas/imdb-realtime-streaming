services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: imdb-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: imdb_reviews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./1-infrastructure/init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka (KRaft mode - no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: imdb-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    depends_on:
      postgres:
        condition: service_healthy

  # Debezium Connect
  debezium-connect:
    image: debezium/connect:2.3
    container_name: imdb-debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
    depends_on:
      - kafka
      - postgres
    volumes:
      - ./1-infrastructure/register-connector.json:/kafka/connect/register-connector.json

  # Data Simulator
  simulator:
    build: ./2-data-simulator
    container_name: imdb-simulator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: imdb_reviews
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./2-data-simulator/IMDB_Dataset.csv:/app/IMDB_Dataset.csv

  # Backend Processor
  backend:
    build: ./3-backend-processor
    container_name: imdb-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/imdb_reviews
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - postgres
      - debezium-connect

  # Frontend Dashboard
  frontend:
    build: ./4-frontend-dashboard
    container_name: imdb-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_WEBSOCKET_URL: ws://localhost:8080/ws/sentiment
    volumes:
      - ./4-frontend-dashboard/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data: